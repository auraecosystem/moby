events { worker_connections 1024; }

http {
    upstream go_app_cluster {
        server web_server:8080; # Points to the Docker service name
    }

    server {
        listen 80;
        server_name localhost;

        # Global performance tuning headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate Limiting configuration could also be added here

        location /api/ {
            proxy_pass http://go_app_cluster;
        }

        location /static/ {
            proxy_pass http://go_app_cluster;
            proxy_cache_valid 200 302 10m; # Cache static files at edge
        }
    }
}
